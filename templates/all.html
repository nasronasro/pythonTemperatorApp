{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DHT11 • Graphique en temps réel</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3">
      <i class="bi bi-graph-up text-primary"></i> Graphique DHT11
    </h1>
    <button id="refresh" class="btn btn-outline-primary">
      <span class="spinner-border spinner-border-sm d-none"></span>
      Rafraîchir
    </button>
  </div>

  <div class="row g-4">
    <!-- Température Graph -->
    <div class="col-lg-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h5 class="card-title text-danger">
            <i class="bi bi-thermometer-sun"></i> Température (°C)
          </h5>
          <canvas id="tempChart" height="200"></canvas>
        </div>
      </div>
    </div>

    <!-- Humidité Graph -->
    <div class="col-lg-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h5 class="card-title text-info">
            <i class="bi bi-droplet-fill"></i> Humidité (%)
          </h5>
          <canvas id="humChart" height="200"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center mt-3">
    <small class="text-muted">Mise à jour automatique toutes les 30 secondes</small>
  </div>

</div>

<script src="{% static 'js/all.js' %}"></script>
</body>
</html>
