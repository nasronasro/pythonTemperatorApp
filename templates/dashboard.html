{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DHT11 • Tableau de bord</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">
      <i class="bi bi-thermometer-half text-primary"></i> DHT11 Monitor
    </h1>
    <button id="refresh" class="btn btn-primary">
      <span class="spinner-border spinner-border-sm d-none" role="status"></span>
      Rafraîchir
    </button>
  </div>

  <!-- Cards -->
  <div class="row g-4">
    <!-- Température -->
    <div class="col-md-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body text-center">
          <i class="bi bi-thermometer-sun display-1 text-danger"></i>
          <h2 class="mt-3 mb-1" id="temp">--</h2>
          <p class="text-muted small">Température (°C)</p>
        </div>
      </div>
    </div>

    <!-- Humidité -->
    <div class="col-md-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body text-center">
          <i class="bi bi-droplet-fill display-1 text-info"></i>
          <h2 class="mt-3 mb-1" id="hum">--</h2>
          <p class="text-muted small">Humidité (%)</p>
        </div>
      </div>
    </div>

    <!-- Horodatage -->
    <div class="col-md-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body text-center">
          <i class="bi bi-clock-history display-1 text-success"></i>
          <h2 class="mt-3 mb-1" id="time">--</h2>
          <p class="text-muted small">Dernière mesure</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Status -->
  <div class="text-center mt-4">
    <span id="status" class="badge bg-secondary fs-6">Chargement...</span>
  </div>

</div>

<!-- Bootstrap JS + Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- App JS -->
<script src="{% static 'js/app.js' %}"></script>
</body>
</html>
